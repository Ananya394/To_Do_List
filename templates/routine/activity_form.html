{% extends 'routine/base.html' %}

{% block content %}
<h2 class="text-2xl font-bold mb-4">{% if form.instance.pk %}Edit{% else %}Add{% endif %} Activity</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success mt-2">Save</button>
    <a href="{% url 'activity_list' %}" class="btn btn-secondary mt-2">Cancel</a>
</form>
{% endblock %}
