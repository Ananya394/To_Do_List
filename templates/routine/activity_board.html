{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Activity Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-gray-100">
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    {% for key, tasks in columns.items %}
      <div class="bg-{{ key|default_if_none:'gray' }}-200 p-4 rounded-lg shadow">
<h2 class="text-xl font-bold mb-2 capitalize">{{ key|title }}</h2>
        
        <form method="post" action="{% url 'add_activity' key %}" class="mb-2">
          {% csrf_token %}
          <input type="text" name="title" placeholder="New Task" class="w-full p-1 rounded border" required>
          <button type="submit" class="w-full mt-1 bg-blue-500 text-white rounded px-2 py-1">Add Task</button>
        </form>
        
        {% for task in tasks %}
          <div class="bg-white p-2 rounded shadow mb-2 {% if task.completed %}bg-green-200{% endif %}">
            <div class="flex justify-between">
              <span>{{ task.title }}</span>
              <div>
                <a href="{% url 'complete_activity' task.pk %}" class="text-sm text-green-700">✔</a>
                <a href="{% url 'edit_activity' task.pk %}" class="text-sm text-blue-700 ml-2">✎</a>
              </div>
            </div>
            {% if task.due_date %}<div class="text-xs text-gray-500">Due: {{ task.due_date }}</div>{% endif %}
          </div>
        {% endfor %}
      </div>
    {% endfor %}
  </div>
</body>
</html>
